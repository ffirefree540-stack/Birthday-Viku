<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love ❤️</title>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
}

.container {
    padding: 50px;
}

h1 {
    font-size: 3em;
}

p {
    font-size: 1.2em;
    max-width: 700px;
    margin: auto;
    line-height: 1.6;
}

.heart {
    font-size: 40px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
}

button:hover {
    background: #ffe0e9;
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday Vikruthi 🎂❤️</h1>
    <div class="heart">❤️</div>

    <p>
        From the day we started our journey on Dec 20, 2025,
        my life became more beautiful because of you...
        (Paste your long birthday message here 💌)
    </p>

    <button onclick="showLove()">Click for Surprise 💖</button>
</div>

<script>
function showLove() {
    alert("I love you so much Vikruthi 😚👸🏻❤️");
}
</script>

</body>
</html>
